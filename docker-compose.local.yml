services:
  redis:
    image: redis:7-alpine
    container_name: dagaga-redis-local
    platform: linux/amd64
    ports:
      - "6379:6379"
    volumes:
      - redis-local-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-local-data:
