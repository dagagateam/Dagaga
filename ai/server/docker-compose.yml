version: '3.8'

services:
  gms-service:
    build:
      context: .
      dockerfile: Dockerfile.gms
    container_name: gadada-gms
    ports:
      - "4000:4000"
    env_file:
      - .env
    restart: unless-stopped

  asr-service:
    build:
      context: ..  # ai/ 폴더 빌드 컨텍스트
      dockerfile: server/Dockerfile.asr
    image: gadada-asr:latest
    container_name: gadada-asr
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ../finetuned:/app/finetuned  # 모델 볼륨 마운트
      - ./unified_asr.py:/app/unified_asr.py  
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - CUDA_LAUNCH_BLOCKING=1  # 디버깅용
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s