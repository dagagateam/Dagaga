spring.application.name=app

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=validate

# FastAPI Server URL
translate.fastapi.url=${ASR_SERVER}

# GMS API Server URL
gms.api.url=${GMS_SERVER}

# File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Gemini API
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-2.0-flash-lite

# Springdoc / Swagger
springdoc.api-docs.path=/v3/api-docs

# 리버스 프록시 환경에서 호스트 헤더를 유지하기 위한 설정
server.forward-headers-strategy=framework

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry=${JWT_ACCESS_TOKEN_EXPIRY:1800}
jwt.refresh-token-expiry=${JWT_REFRESH_TOKEN_EXPIRY:604800}

# Security Configuration
security.max-concurrent-sessions=${MAX_CONCURRENT_SESSIONS:3}
