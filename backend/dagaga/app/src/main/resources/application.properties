spring.application.name=app
server.port=8080

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

#spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=validate

# FastAPI Server URL
translate.fastapi.url=${ASR_SERVER:http://localhost:8000}

# Gemini API Server URL
gemini.api.url=${API_SERVER:http://localhost:8001}

# File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Gemini API
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-2.0-flash-lite

# Springdoc / Swagger
springdoc.api-docs.path=/v3/api-docs

# 리버스 프록시 환경에서 호스트 헤더를 유지하기 위한 설정
server.forward-headers-strategy=framework

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
chat.redis.topic=${CHAT_REDIS_TOPIC:chat-topic}

# JWT Configuration
jwt.secret=${JWT_SECRET:dev_secret_key_for_local_development_only}
jwt.access-token-expiry=${JWT_ACCESS_TOKEN_EXPIRY:1800}
jwt.refresh-token-expiry=${JWT_REFRESH_TOKEN_EXPIRY:604800}

# Security Configuration
security.max-concurrent-sessions=${MAX_CONCURRENT_SESSIONS:3}

# OAuth2 Configuration
app.oauth2.frontend-redirect-uri=${FRONTEND_URL:http://localhost:5173}/Auth/Success
app.oauth2.frontend-signup-uri=${FRONTEND_URL:http://localhost:5173}/Signup/Social

# Google OAuth (Register at https://console.cloud.google.com)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Logging Configuration
logging.level.com.dagaga.security.stomp=DEBUG
