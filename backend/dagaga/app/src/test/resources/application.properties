spring.application.name=app-test

# H2 Database Configuration for Testing
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate/JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Turn off unrelated external services if needed
translate.fastapi.url=http://localhost:8000
gms.api.url=http://localhost:8001

# Gemini API for Testing
gemini.api.key=dummy-key
gemini.model=gemini-2.0-flash-lite
