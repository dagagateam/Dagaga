spring.application.name=app-test

# H2 Database Configuration for Testing
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate/JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Turn off unrelated external services if needed
translate.fastapi.url=http://localhost:8000
gms.api.url=http://localhost:8001

# Gemini API for Testing
gemini.api.key=dummy-key
gemini.model=gemini-2.0-flash-lite

# JWT Configuration for Testing
jwt.secret=9a96e95B8df2c15c1e7845f94d975a6439Ea45fc4972e3a10bd71a72a08470a2
jwt.access-token-expiry=1800
jwt.refresh-token-expiry=604800

# Redis Configuration for Testing (Mocked or Embedded)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Security Configuration for Testing
security.max-concurrent-sessions=3

# OAuth2 Configuration for Testing
app.oauth2.frontend-redirect-uri=http://localhost:5173/Auth/Success
app.oauth2.frontend-signup-uri=http://localhost:5173/Signup/Social
spring.security.oauth2.client.registration.google.client-id=dummy-id
spring.security.oauth2.client.registration.google.client-secret=dummy-secret
